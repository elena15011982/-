  <style>

#products{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.product img{
max-width:150px;
}
/* ===== HEADER / МЕНЮ ===== */

.u-custom-menu{
display:flex;
align-items:center;
justify-content:center;
background:#f5f5f5;
padding:15px 20px;
}

/* Основной список */
.u-nav{
display:flex;
gap:30px;
list-style:none;
margin:0;
padding:0;
}

/* Пункты */
.u-nav-item{
position:relative;
}

/* Ссылки */
.u-nav-link{
text-decoration:none;
color:#333;
font-size:16px;
padding:5px 0;
display:block;
transition:0.3s;
}

.u-nav-link:hover{
color:#c9a227;
}

/* ===== ВЫПАДАЮЩЕЕ МЕНЮ ===== */

.u-nav-popup{
display:none;
position:absolute;
top:100%;
left:0;
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
padding:10px 0;
min-width:220px;
z-index:1000;
}

/* показываем при наведении */
.u-nav-item:hover > .u-nav-popup{
display:block;
}

/* пункты внутри dropdown */
.u-nav-popup .u-nav{
flex-direction:column;
gap:0;
}

/* ссылки внутри */
.u-nav-popup .u-nav-link{
padding:10px 20px;
font-size:14px;
color:#555;
white-space:nowrap;
}

.u-nav-popup .u-nav-link:hover{
background:#f5f5f5;
color:#000;
}

/* ===== КОРЗИНА (если есть) ===== */
.u-shopping-cart{
margin-left:20px;
position:relative;
}

/* ===== АДАПТИВ ===== */
@media (max-width:900px){

.u-nav{
flex-direction:column;
gap:10px;
}

.u-nav-popup{
position:static;
box-shadow:none;
}

}

  </style>
  </head>

  <script>

fetch("products.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("products")

data.forEach(product => {

container.innerHTML += `
<div class="product">

<img src="${product.img}" width="150">

<h3>${product.name}</h3>

<p>${product.price} ₴</p>

</div>
`

})

})
