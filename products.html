  <script>

fetch("products.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("products")

data.forEach(product => {

container.innerHTML += `
<div class="product">

<img src="${product.img}" width="150">

<h3>${product.name}</h3>

<p>${product.price} ₴</p>

</div>
`

})

})
